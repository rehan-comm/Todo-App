<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <title>Todo List - Practice Project</title>
</head>
<body>
    <header>
        <h1>Todo App</h1>
        <span>Developed By Rehan</span>
    </header>
    <br>
    <br>
    <div class="container">
        <h1>Add Todo List Here.</h1>
        <div class="todo-input">
            <input type="text" class="input" placeholder="Enter your Task">
            <input type="text" class="desc" placeholder="Enter the Description">
            <button class="add">Add Todo</button>
        </div>
        <div class="todo-container">
            <span class="no-todo">No todo yet!</span>
        </div>
    </div>








    <script src="script.js"></script>
</body>
</html>
